services:
  bot:
    build: .
    container_name: profbot
    command: python main.py
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/profbot
    volumes:
      - ./:/app
    depends_on:
      - redis
      - postgres
  postgres:
    image: postgres:15-alpine
    container_name: profbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: profbot
    ports:
      - "5432:5432"
      
  redis:
    image: redis:7-alpine
    container_name: profbot-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
